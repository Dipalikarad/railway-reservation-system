<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Railway Booking System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(135deg, #2c3e50, #3498db); justify-content: center; align-items: center;">

    <div class="form-container">
        <h2 class="text-center" style="margin-bottom: 1.5rem; color: var(--primary-color);">Register</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="userName" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="role">
                    <option value="staff">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-block">Register</button>
        </form>
        <p class="mt-1 text-center">
            Already have an account? <a href="index.html">Login here</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        auth.redirectIfAuthenticated();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                userName: document.getElementById('userName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };
            
            const result = await auth.register(userData);
            if (result.success) {
                alert('Registration successful! Please login.');
                window.location.href = 'index.html';
            } else {
                showAlert(result.message, 'error');
            }
        });
    </script>
</body>
</html>
