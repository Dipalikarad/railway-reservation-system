<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Railway Booking System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(135deg, #2c3e50, #3498db); justify-content: center; align-items: center;">

    <div class="form-container">
        <h2 class="text-center" style="margin-bottom: 1.5rem; color: var(--primary-color);">Railway Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-block">Login</button>
        </form>
        <p class="mt-1 text-center">
            Don't have an account? <a href="register.html">Register here</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        auth.redirectIfAuthenticated();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const result = await auth.login(email, password);
            if (result.success) {
                const user = auth.getUser();
                if (user.role === 'admin') {
                    window.location.href = 'pages/admin/dashboard.html';
                } else {
                    window.location.href = 'pages/dashboard.html';
                }
            } else {
                showAlert(result.message, 'error');
            }
        });
    </script>
</body>
</html>
